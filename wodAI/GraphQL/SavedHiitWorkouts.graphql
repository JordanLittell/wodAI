query SavedHiitWorkoutsQuery {
  savedHiitWorkouts {
    id
    savedAt
    workout {
      id
      format
      displayText
      stimulus
      constraintType
      constraintMagnitude
      timeCap
      timingScheme {
        version
        segments {
          rounds
          phases {
            durationSeconds
            direction
            label
          }
        }
      }
    }
  }
}
