query GetWorkoutsByDateRange($startDate: DateTime!, $endDate: DateTime!) {
  getWorkoutsByDateRange(startDate: $startDate, endDate: $endDate) {
    id
    name
    description
    coaching
    stimulus
    scheduledDate
    status
    completed
    completedAt
    components {
      id
      name
      definition
      description
      muscles
      movements
      order
    }
  }
}
